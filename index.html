<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Spark Racquetball</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spark" />
  <meta name="theme-color" content="#1a472a" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --court:        #1a472a;
      --court-mid:    #2d6a42;
      --court-light:  #3d8a58;
      --accent:       #e8b84b;
      --accent-dark:  #c99a30;
      --bg:           #f4f2ed;
      --bg2:          #eceae4;
      --surface:      #ffffff;
      --border:       rgba(0,0,0,0.09);
      --border-mid:   rgba(0,0,0,0.15);
      --txt:          #1c1c1a;
      --txt2:         #6b6b66;
      --txt3:         #9a9a94;
      --court-text:   #1a472a;
      --danger:       #c0392b;
      --success:      #27ae60;
      --radius:       12px;
      --radius-sm:    8px;
      --radius-pill:  999px;
      --shadow:       0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg:    0 8px 32px rgba(0,0,0,0.12);
      --font:         'DM Sans', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --safe-top:     env(safe-area-inset-top, 0px);
      --safe-bot:     env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #131510;
        --bg2:     #1c1f19;
        --surface: #242820;
        --border:  rgba(255,255,255,0.08);
        --border-mid: rgba(255,255,255,0.15);
        --txt:     #f0eeea;
        --court-text: #52b07a;
        --txt2:    #aeada4;
        --txt3:    #808079;
        --shadow:  0 2px 12px rgba(0,0,0,0.3);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
      }
    }

    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    #app { max-width: 600px; margin: 0 auto; padding: 0 0 calc(2rem + var(--safe-bot)); }

    .screen { display: none; animation: fadeIn 0.18s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Header ── */
    .app-header {
      background: var(--court);
      padding: calc(1rem + var(--safe-top)) 1.25rem 1rem;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; line-height: 1;
    }
    .header-title { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
    .header-sub   { color: rgba(255,255,255,0.55); font-size: 11px; margin-top: 1px; }
    .back-btn {
      background: rgba(255,255,255,0.14);
      border: none; color: #fff;
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      cursor: pointer; font-size: 13px;
      font-family: var(--font);
      display: none;
    }
    .back-btn.visible { display: block; }
    .back-btn:active { background: rgba(255,255,255,0.25); }

    /* ── Nav tabs ── */
    .nav-tabs {
      display: flex; gap: 3px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px 0;
    }
    .nav-tab {
      flex: 1; padding: 8px 4px 10px;
      border: none; background: transparent;
      cursor: pointer; font-size: 13px; font-weight: 400;
      color: var(--txt2); font-family: var(--font);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-tab.active { color: var(--court-text); border-bottom-color: var(--court-text); font-weight: 500; }

    /* ── Content padding ── */
    .content { padding: 1rem 1rem 0; }

    /* ── Section label ── */
    .section-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--txt3); margin-bottom: 8px; margin-top: 4px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .card-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header-title { font-size: 12px; font-weight: 500; color: var(--txt2); }

    /* ── Session list item ── */
    .session-item {
      display: flex; align-items: center;
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; gap: 12px;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .session-item:last-child { border-bottom: none; }
    .session-item:active { background: var(--bg2); }
    .session-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--court-mid); flex-shrink: 0;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-date { font-size: 14px; font-weight: 500; color: var(--txt); }
    .session-meta { font-size: 12px; color: var(--txt2); margin-top: 2px; }
    .session-amount { font-size: 18px; font-weight: 600; color: var(--court-text); font-family: var(--font-mono); }
    .chevron { color: var(--txt3); font-size: 16px; }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--txt2); display: block; margin-bottom: 6px; }
    input[type=text], input[type=date] {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      font-size: 15px; font-family: var(--font);
      background: var(--surface); color: var(--txt);
      outline: none; -webkit-appearance: none;
    }
    input:focus { border-color: var(--court-mid); box-shadow: 0 0 0 3px rgba(45,106,66,0.12); }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; }

    /* ── Player pills ── */
    .pill-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .player-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px 5px 6px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-mid);
      background: var(--surface);
      font-size: 13px; color: var(--txt);
    }
    .player-pill .rm {
      cursor: pointer; color: var(--txt3);
      font-size: 15px; line-height: 1;
      padding: 0 1px;
    }
    .player-pill .rm:hover { color: var(--danger); }

    /* ── Avatars ── */
    .av {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .av-lg { width: 30px; height: 30px; font-size: 12px; }
    .av-xl { width: 38px; height: 38px; font-size: 14px; }
    .av0{background:#1a6b3c} .av1{background:#185fa5} .av2{background:#8a3060}
    .av3{background:#7a4a0a} .av4{background:#4a3ab0} .av5{background:#0f6e56}
    .av6{background:#993020} .av7{background:#5a0f6e} .av8{background:#2d6a10}
    .av9{background:#1a4a6b}

    /* ── Payer selector ── */
    .payer-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .payer-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 13px 8px 8px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-mid);
      background: var(--surface);
      cursor: pointer; font-size: 13px; color: var(--txt);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      transition: all 0.12s;
    }
    .payer-btn.selected {
      background: var(--court);
      color: #fff; border-color: var(--court);
    }
    .payer-btn:active { opacity: 0.8; }

    /* ── Slot grid ── */
    .slot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px; overflow: hidden;
    }
    .slot-header {
      padding: 10px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .slot-time { font-size: 14px; font-weight: 600; color: var(--txt); }
    .slot-cost { font-size: 12px; color: var(--txt2); font-family: var(--font-mono); }
    .slot-players { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 7px; }
    .toggle-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 13px 9px 9px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-mid);
      background: var(--bg2);
      cursor: pointer; font-size: 14px; color: var(--txt2);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      transition: all 0.12s;
      min-height: 44px;
    }
    .toggle-btn.on {
      background: var(--court);
      color: #fff; border-color: var(--court);
    }
    .toggle-btn:active { opacity: 0.75; transform: scale(0.97); }
    .toggle-btn .av { background: rgba(255,255,255,0.22); }
    .toggle-btn:not(.on) .av { background: rgba(0,0,0,0.08); color: var(--txt); }

    /* ── Results ── */
    .results-hero {
      background: var(--court);
      padding: 1.25rem 1rem;
      text-align: center;
      color: #fff;
    }
    .results-hero-date { font-size: 12px; opacity: 0.65; margin-bottom: 4px; }
    .results-hero-total { font-size: 32px; font-weight: 600; font-family: var(--font-mono); }
    .results-hero-sub { font-size: 12px; opacity: 0.7; margin-top: 4px; }

    .player-result-row {
      display: flex; align-items: flex-start;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .player-result-row:last-child { border-bottom: none; }
    .player-result-row.payer-highlight { background: rgba(232,184,75,0.07); }
    .pr-info { flex: 1; min-width: 0; }
    .pr-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .pr-breakdown { font-size: 12px; color: var(--txt2); margin-top: 3px; font-family: var(--font-mono); line-height: 1.6; }
    .pr-amounts { text-align: right; }
    .pr-total { font-size: 21px; font-weight: 600; font-family: var(--font-mono); color: var(--court-text); }
    .pr-label { font-size: 13px; font-weight: 500; color: var(--txt); margin-top: 3px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-size: 10px; font-weight: 600;
      background: var(--accent); color: #6b4a00;
    }

    /* ── Summary ── */
    .summary-player {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px; overflow: hidden;
    }
    .sp-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .sp-name { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 500; }
    .sp-stats { text-align: right; }
    .sp-total { font-size: 20px; font-weight: 600; font-family: var(--font-mono); color: var(--court-text); }
    .sp-sub { font-size: 12px; color: var(--txt2); margin-top: 2px; }
    .sp-session-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .sp-session-row:last-child { border-bottom: none; }
    .sp-session-date { color: var(--txt2); }
    .sp-session-detail { font-size: 12px; color: var(--txt2); margin-top: 2px; }
    .sp-session-amt { font-size: 15px; font-weight: 600; font-family: var(--font-mono); color: var(--court-text); }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-mid);
      background: var(--surface);
      color: var(--txt);
      font-size: 15px; font-weight: 500;
      font-family: var(--font);
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.12s;
    }
    .btn:active { opacity: 0.75; transform: scale(0.98); }
    .btn-primary { background: var(--court); color: #fff; border-color: var(--court); }
    .btn-primary:disabled { background: var(--court-light); opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn-row .btn { display: flex; align-items: center; justify-content: center; }

    /* ── Loading ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      padding: 3rem 1rem;
      color: var(--txt2); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--court);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--txt2); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--txt); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: calc(1.5rem + var(--safe-bot));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--txt); color: var(--bg);
      padding: 10px 18px; border-radius: var(--radius-pill);
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: all 0.25s; pointer-events: none;
      white-space: nowrap; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* ── Delete button ── */
    .danger-btn {
      background: none; border: none;
      color: var(--danger); font-size: 13px;
      cursor: pointer; font-family: var(--font);
      padding: 8px 0; margin-top: 6px;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Sticky header -->
  <div class="app-header">
    <div class="header-left">
      <div class="header-icon">🏸</div>
      <div>
        <div class="header-title">Spark Racquetball</div>
        <div class="header-sub">Court reimbursement</div>
      </div>
    </div>
    <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
  </div>

  <!-- SCREEN: Sessions list -->
  <div class="screen active" id="screen-sessions">
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-btn-sessions" onclick="showTab('sessions')">Sessions</button>
      <button class="nav-tab" id="tab-btn-summary" onclick="showTab('summary')">Player summary</button>
    </div>

    <div class="content">
      <div id="tab-sessions-content">
        <div id="sessionsList"><div class="loading"><div class="spinner"></div>Loading sessions…</div></div>
        <button class="btn btn-primary" style="margin-top:4px;" onclick="showScreen('new-session')">+ New session</button>
      </div>
      <div id="tab-summary-content" style="display:none">
        <div id="summaryList"><div class="loading"><div class="spinner"></div>Loading…</div></div>
      </div>
    </div>
  </div>

  <!-- SCREEN: New session setup -->
  <div class="screen" id="screen-new-session">
    <div class="content">
      <div class="card" style="margin-top:12px;">
        <div class="card-header"><span class="card-header-title">Session details</span></div>
        <div style="padding:14px;">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="newDate" />
          </div>
          <div class="form-group">
            <label class="form-label">Add players</label>
            <div class="input-row">
              <input type="text" id="newPlayerName" placeholder="Player name…" onkeydown="if(event.key==='Enter'){event.preventDefault();addPlayer()}" />
              <button class="btn" style="width:auto;padding:11px 16px;" onclick="addPlayer()">Add</button>
            </div>
            <div class="pill-wrap" id="playerPills" style="margin-top:10px;"></div>
          </div>
          <div class="form-group" id="payerSection" style="display:none;">
            <label class="form-label">Who paid Spark today?</label>
            <div class="payer-grid" id="payerGrid"></div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" style="flex:1" onclick="goBack()">Cancel</button>
        <button class="btn btn-primary" style="flex:2" id="startSessionBtn" onclick="startSession()" disabled>Set time slots →</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Time slot entry -->
  <div class="screen" id="screen-time-entry">
    <div class="content" style="padding-top:12px;">
      <p style="font-size:13px;color:var(--txt2);margin-bottom:12px;">Tap each player to mark the half-hour periods they played.</p>
      <div id="slotGrid"></div>
      <div class="btn-row">
        <button class="btn" style="flex:1" onclick="goBack()">← Players</button>
        <button class="btn btn-primary" style="flex:2" onclick="showResults()">Calculate →</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Results preview -->
  <div class="screen" id="screen-results">
    <div id="resultsContent"></div>
    <div class="content">
      <div class="btn-row" style="margin-top:4px;">
        <button class="btn" style="flex:1" onclick="showScreen('time-entry')">← Edit slots</button>
        <button class="btn btn-primary" style="flex:2" id="saveBtn" onclick="saveSession()">Save session</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Session detail -->
  <div class="screen" id="screen-session-detail">
    <div id="detailContent"></div>
    <div class="content">
      <button class="danger-btn" onclick="deleteSession()">Delete this session</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─── PASTE YOUR FIREBASE CONFIG HERE ────────────────────────────────────────
  // Replace every value below with your own from the Firebase console.
  // See SETUP-GUIDE.md for step-by-step instructions.
  const firebaseConfig = {
    apiKey: "AIzaSyC_vd7NLXJ1_hBY9ACvrmdMVY675fbZZ7o",
    authDomain: "rball-payer.firebaseapp.com",
    databaseURL: "https://rball-payer-default-rtdb.firebaseio.com",
    projectId: "rball-payer",
    storageBucket: "rball-payer.firebasestorage.app",
    messagingSenderId: "156483532091",
    appId: "1:156483532091:web:06572ef8c34759ac7d731e",
    measurementId: "G-537DNNWNBN"
  };
  // ────────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ─── Constants ───────────────────────────────────────────────────────────────
  const SLOTS = [
    '9:00 – 9:30', '9:30 – 10:00', '10:00 – 10:30',
    '10:30 – 11:00', '11:00 – 11:30', '11:30 – 12:00'
  ];
  const COST_PER_SLOT = 15; // $15 per half-hour

  // ─── State ───────────────────────────────────────────────────────────────────
  let allSessions   = {};
  let sessionPlayers = [];
  let payerName      = null;
  let slotData       = [];          // array of Set<string>
  let screenStack    = ['sessions'];
  let activeTab      = 'sessions';
  let currentSessionId = null;

  // ─── Utilities ───────────────────────────────────────────────────────────────
  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }
  function avClass(name) {
    let h = 0;
    for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xff;
    return 'av' + (h % 10);
  }
  function fmt(n)  { return '$' + n.toFixed(2); }
  function fmtDate(d) {
    if (!d) return '';
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
    });
  }
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }
  function avEl(name, size = '') {
    return `<div class="av ${size} ${avClass(name)}">${initials(name)}</div>`;
  }

  // ─── Navigation ──────────────────────────────────────────────────────────────
  window.showScreen = function(name) {
    if (name === 'new-session') initNewSessionForm();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    screenStack.push(name);
    document.getElementById('backBtn').classList.toggle('visible', name !== 'sessions');
    window.scrollTo(0, 0);
  };
  window.goBack = function() {
    screenStack.pop();
    const prev = screenStack[screenStack.length - 1] || 'sessions';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + prev).classList.add('active');
    document.getElementById('backBtn').classList.toggle('visible', prev !== 'sessions');
    window.scrollTo(0, 0);
  };
  window.showTab = function(tab) {
    activeTab = tab;
    document.getElementById('tab-btn-sessions').classList.toggle('active', tab === 'sessions');
    document.getElementById('tab-btn-summary').classList.toggle('active', tab === 'summary');
    document.getElementById('tab-sessions-content').style.display = tab === 'sessions' ? '' : 'none';
    document.getElementById('tab-summary-content').style.display  = tab === 'summary'  ? '' : 'none';
    if (tab === 'summary') renderSummary();
  };

  // ─── Firebase: real-time listener ────────────────────────────────────────────
  onValue(ref(db, 'sessions'), snapshot => {
    allSessions = snapshot.val() || {};
    renderSessionsList();
    if (activeTab === 'summary') renderSummary();
    // Refresh detail screen if open
    if (currentSessionId && allSessions[currentSessionId]) {
      renderDetailContent(currentSessionId, allSessions[currentSessionId]);
    }
  });

  // ─── Sessions list ────────────────────────────────────────────────────────────
  function renderSessionsList() {
    const el = document.getElementById('sessionsList');
    const sessions = Object.entries(allSessions)
      .sort(([, a], [, b]) => b.date.localeCompare(a.date));
    if (!sessions.length) {
      el.innerHTML = `<div class="empty">
        <div class="empty-icon">🏸</div>
        <div class="empty-title">No sessions yet</div>
        <div class="empty-sub">Tap "New session" to record your first game.</div>
      </div>`;
      return;
    }
    el.innerHTML = sessions.map(([id, s]) => {
      const total = s.players.reduce((sum, p) => sum + p.total, 0);
      return `<div class="card" style="margin-bottom:8px;cursor:pointer;" onclick="viewSession('${id}')">
        <div class="session-item">
          <div class="session-dot"></div>
          <div class="session-info">
            <div class="session-date">${fmtDate(s.date)}</div>
            <div class="session-meta">${s.players.length} players · paid by ${s.payer}</div>
          </div>
          <div class="session-amount">${fmt(total)}</div>
          <div class="chevron">›</div>
        </div>
      </div>`;
    }).join('');
  }

  // ─── Summary ─────────────────────────────────────────────────────────────────
  function renderSummary() {
    const el = document.getElementById('summaryList');
    const sessions = Object.values(allSessions);
    if (!sessions.length) {
      el.innerHTML = `<div class="empty"><div class="empty-sub">No sessions recorded yet.</div></div>`;
      return;
    }
    const map = {};
    for (const s of sessions) {
      const total = s.players.reduce((sum, p) => sum + p.total, 0);
      for (const p of s.players) {
        if (!map[p.name]) map[p.name] = { owed: 0, paid: 0, sessions: [] };
        map[p.name].owed += p.total;
        if (s.payer === p.name) map[p.name].paid += total;
        map[p.name].sessions.push({ date: s.date, owed: p.total, isPayer: s.payer === p.name, payer: s.payer });
      }
    }
    el.innerHTML = Object.entries(map)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([name, data]) => {
        const rows = [...data.sessions]
          .sort((a, b) => b.date.localeCompare(a.date))
          .map(s => `<div class="sp-session-row">
            <div>
              <div class="sp-session-date">${fmtDate(s.date)}</div>
              ${s.isPayer ? '<div class="sp-session-detail" style="color:var(--court-text);">paid Spark this day</div>' : `<div class="sp-session-detail">owes ${fmt(s.owed)} to ${s.payer}</div>`}
            </div>
            <div class="sp-session-amt">${fmt(s.owed)}</div>
          </div>`).join('');
        return `<div class="summary-player">
          <div class="sp-header">
            <div class="sp-name">${avEl(name, 'av-lg')} ${name}</div>
            <div class="sp-stats">
              <div class="sp-total">${fmt(data.owed)}</div>
              <div class="sp-sub">${data.sessions.length} session${data.sessions.length !== 1 ? 's' : ''}</div>
            </div>
          </div>
          ${rows}
        </div>`;
      }).join('');
  }

  // ─── View session detail ──────────────────────────────────────────────────────
  window.viewSession = function(id) {
    currentSessionId = id;
    renderDetailContent(id, allSessions[id]);
    showScreen('session-detail');
  };

  function renderDetailContent(id, s) {
    const total = s.players.reduce((sum, p) => sum + p.total, 0);
    const rows = s.players.map(p => {
      const isPayer = p.name === s.payer;
      const owes    = total - p.total;
      const netLabel = isPayer
        ? (owes > 0.001 ? `receives ${fmt(owes)} back` : 'break even')
        : `owes ${fmt(p.total)} to ${s.payer}`;
      const breakdown = (s.slots || []).map((slot, i) => {
        if (!slot.includes(p.name)) return null;
        return `${SLOTS[i]}: ${fmt(COST_PER_SLOT / slot.length)}`;
      }).filter(Boolean).join(' · ');
      return `<div class="player-result-row ${isPayer ? 'payer-highlight' : ''}">
        ${avEl(p.name, 'av-lg')}
        <div class="pr-info">
          <div class="pr-name">
            ${p.name}
            ${isPayer ? '<span class="badge">paid Spark</span>' : ''}
          </div>
          <div class="pr-breakdown">${breakdown || 'did not play'}</div>
        </div>
        <div class="pr-amounts">
          <div class="pr-total">${fmt(p.total)}</div>
          <div class="pr-label">${netLabel}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('detailContent').innerHTML = `
      <div class="results-hero">
        <div class="results-hero-date">${fmtDate(s.date)}</div>
        <div class="results-hero-total">${fmt(total)}</div>
        <div class="results-hero-sub">total · paid by ${s.payer}</div>
      </div>
      <div class="card" style="margin:12px 12px 0; border-radius:var(--radius);">${rows}</div>`;
  }

  // ─── Delete session ───────────────────────────────────────────────────────────
  window.deleteSession = async function() {
    if (!currentSessionId) return;
    if (!confirm('Delete this session? This cannot be undone.')) return;
    await remove(ref(db, 'sessions/' + currentSessionId));
    currentSessionId = null;
    toast('Session deleted');
    screenStack = ['sessions'];
    showScreen('sessions');
    document.getElementById('backBtn').classList.remove('visible');
  };

  // ─── New session form ─────────────────────────────────────────────────────────
  function initNewSessionForm() {
    document.getElementById('newDate').value = new Date().toISOString().slice(0, 10);
    sessionPlayers = [];
    payerName = null;
    document.getElementById('newPlayerName').value = '';
    renderPills();
    renderPayerGrid();
    updateStartBtn();
  }

  window.addPlayer = function() {
    const inp  = document.getElementById('newPlayerName');
    const name = inp.value.trim();
    if (!name || sessionPlayers.includes(name)) { inp.value = ''; return; }
    sessionPlayers.push(name);
    inp.value = '';
    renderPills();
    renderPayerGrid();
    updateStartBtn();
    inp.focus();
  };

  window.removePlayer = function(name) {
    sessionPlayers = sessionPlayers.filter(p => p !== name);
    if (payerName === name) payerName = null;
    renderPills();
    renderPayerGrid();
    updateStartBtn();
  };

  window.selectPayer = function(name) {
    payerName = name;
    renderPayerGrid();
    updateStartBtn();
  };

  function renderPills() {
    document.getElementById('playerPills').innerHTML =
      sessionPlayers.map(p => `<div class="player-pill">
        ${avEl(p)} ${p}
        <span class="rm" onclick="removePlayer('${p}')">&times;</span>
      </div>`).join('');
  }

  function renderPayerGrid() {
    const section = document.getElementById('payerSection');
    section.style.display = sessionPlayers.length ? '' : 'none';
    document.getElementById('payerGrid').innerHTML =
      sessionPlayers.map(p => `<button class="payer-btn${payerName === p ? ' selected' : ''}" onclick="selectPayer('${p}')">
        ${avEl(p)} ${p}
      </button>`).join('');
  }

  function updateStartBtn() {
    document.getElementById('startSessionBtn').disabled =
      !(sessionPlayers.length >= 2 && payerName);
  }

  // ─── Time slot entry ──────────────────────────────────────────────────────────
  window.startSession = function() {
    slotData = SLOTS.map(() => new Set());
    renderSlotGrid();
    showScreen('time-entry');
  };

  function renderSlotGrid() {
    document.getElementById('slotGrid').innerHTML = SLOTS.map((slot, i) => `
      <div class="slot-card">
        <div class="slot-header">
          <span class="slot-time">${slot}</span>
          <span class="slot-cost" id="slotCost${i}">$15 · no one yet</span>
        </div>
        <div class="slot-players">
          ${sessionPlayers.map(p => `
            <button class="toggle-btn" id="tog-${i}-${CSS.escape(p)}" onclick="togglePlayer(${i},'${p}')">
              ${avEl(p)} ${p}
            </button>`).join('')}
        </div>
      </div>`).join('');
  }

  window.togglePlayer = function(slotIdx, name) {
    if (slotData[slotIdx].has(name)) slotData[slotIdx].delete(name);
    else slotData[slotIdx].add(name);
    const btn = document.getElementById(`tog-${slotIdx}-${CSS.escape(name)}`);
    if (btn) btn.classList.toggle('on', slotData[slotIdx].has(name));
    const cnt = slotData[slotIdx].size;
    const costEl = document.getElementById('slotCost' + slotIdx);
    if (costEl) costEl.textContent = cnt
      ? `$15 ÷ ${cnt} = ${fmt(COST_PER_SLOT / cnt)} each`
      : '$15 · no one yet';
  };

  // ─── Calculate & show results ─────────────────────────────────────────────────
  function calcTotals() {
    const totals = {};
    sessionPlayers.forEach(p => totals[p] = 0);
    slotData.forEach(players => {
      if (!players.size) return;
      const share = COST_PER_SLOT / players.size;
      players.forEach(p => { totals[p] += share; });
    });
    return totals;
  }

  window.showResults = function() {
    const totals   = calcTotals();
    const total    = Object.values(totals).reduce((a, b) => a + b, 0);
    const date     = document.getElementById('newDate').value;
    const rows = sessionPlayers.map(p => {
      const isPayer  = p === payerName;
      const owes     = total - totals[p];
      const netLabel = isPayer
        ? (owes > 0.001 ? `receives ${fmt(owes)} back` : 'break even')
        : `owes ${fmt(totals[p])} to ${payerName}`;
      const breakdown = slotData.map((slot, i) => {
        if (!slot.has(p)) return null;
        return `${SLOTS[i]}: ${fmt(COST_PER_SLOT / slot.size)}`;
      }).filter(Boolean).join(' · ');
      return `<div class="player-result-row ${isPayer ? 'payer-highlight' : ''}">
        ${avEl(p, 'av-lg')}
        <div class="pr-info">
          <div class="pr-name">${p}${isPayer ? '<span class="badge">paid Spark</span>' : ''}</div>
          <div class="pr-breakdown">${breakdown || 'did not play'}</div>
        </div>
        <div class="pr-amounts">
          <div class="pr-total">${fmt(totals[p])}</div>
          <div class="pr-label">${netLabel}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('resultsContent').innerHTML = `
      <div class="results-hero">
        <div class="results-hero-date">${fmtDate(date)}</div>
        <div class="results-hero-total">${fmt(total)}</div>
        <div class="results-hero-sub">total · paid by ${payerName}</div>
      </div>
      <div class="card" style="margin:12px 12px 0;">${rows}</div>`;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = 'Save session';
    saveBtn.disabled = false;
    showScreen('results');
  };

  // ─── Save session ─────────────────────────────────────────────────────────────
  window.saveSession = async function() {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    const totals = calcTotals();
    const session = {
      date:    document.getElementById('newDate').value,
      payer:   payerName,
      players: sessionPlayers.map(p => ({ name: p, total: totals[p] })),
      slots:   slotData.map(s => [...s]),
      savedAt: Date.now()
    };
    try {
      await push(ref(db, 'sessions'), session);
      toast('Session saved!');
      saveBtn.textContent = 'Saved ✓';
      setTimeout(() => {
        screenStack = ['sessions'];
        showScreen('sessions');
        document.getElementById('backBtn').classList.remove('visible');
      }, 800);
    } catch (e) {
      toast('Error saving — check connection');
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save session';
    }
  };

</script>
</body>
</html>
